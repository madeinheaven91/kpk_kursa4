  postgres:
    container_name: anim-crm-pg
    image: postgres
    ports:
      - "${DB_PORT}:${DB_PORT}"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      PG_PORT: ${DB_PORT}
      restart: always
    volumes:
      - postgres-data:/var/lib/postgresql
      # - postgres-migrations:/migrations
    restart: unless-stopped
    networks:
      - proxy

