services:
  frontend:
    container_name: anim-crm-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
    restart: unless-stopped
    networks:
      - proxy

  api:
    container_name: anim-crm-api
    build:
      context: ./api
      dockerfile: Dockerfile
      network: host
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - proxy

  postgres:
    container_name: anim-crm-pg
    image: postgres
    ports:
      - "${DB_PORT}:${DB_PORT}"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      PG_PORT: ${DB_PORT}
      restart: always
    volumes:
      - postgres-data:/var/lib/postgresql
      - postgres-migrations:/seed
    restart: unless-stopped
    networks:
      - proxy

volumes:
  postgres-data:
  postgres-migrations:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./seed

networks:
  proxy:
    name: proxy
